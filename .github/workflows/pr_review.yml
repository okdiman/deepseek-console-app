name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: Run AI Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for accurate diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate diff
        run: |
          git diff "origin/${{ github.base_ref }}...${{ github.sha }}" > /tmp/pr.patch
          echo "Diff size: $(wc -c < /tmp/pr.patch) bytes"

      - name: Run AI review
        env:
          PROVIDER: ${{ vars.PROVIDER || 'deepseek' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RAG_ENABLED: "false"
          MAX_DIFF_CHARS: "60000"
        run: |
          python scripts/review_pr.py \
            --diff /tmp/pr.patch \
            --output /tmp/review.json

      - name: Post inline review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = JSON.parse(fs.readFileSync('/tmp/review.json', 'utf8'));

            const comments = (review.comments || []).map(c => ({
              path: c.path,
              line: c.line,
              side: 'RIGHT',
              body: c.body,
            }));

            const header =
              `> 🤖 Generated by [review_pr.py](` +
              `https://github.com/${{ github.repository }}/blob/${{ github.sha }}/scripts/review_pr.py)\n\n`;

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                commit_id: '${{ github.sha }}',
                body: header + (review.summary || ''),
                event: review.verdict || 'COMMENT',
                comments: comments,
              });
            } catch (err) {
              // Fallback: if inline comments fail (e.g. line not in diff),
              // post as a plain comment so the review is never lost.
              console.error('createReview failed:', err.message, '— falling back to plain comment');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: header + (review.summary || '') + '\n\n' +
                  (review.comments || []).map(c =>
                    `- **\`${c.path}:${c.line}\`** — ${c.body}`
                  ).join('\n'),
              });
            }
