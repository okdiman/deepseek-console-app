name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: Run AI Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for accurate diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate diff
        run: |
          git diff "origin/${{ github.base_ref }}...${{ github.sha }}" > /tmp/pr.patch
          echo "Diff size: $(wc -c < /tmp/pr.patch) bytes"

      - name: Collect changed files
        id: files
        run: |
          FILES=$(git diff --name-only "origin/${{ github.base_ref }}...${{ github.sha }}" | tr '\n' ' ')
          echo "changed=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run AI review
        env:
          PROVIDER: ${{ vars.PROVIDER || 'deepseek' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RAG_ENABLED: "false"   # Ollama is not available in CI
          MAX_DIFF_CHARS: "60000"
        run: |
          python scripts/review_pr.py \
            --diff /tmp/pr.patch \
            --changed-files ${{ steps.files.outputs.changed }} \
            > /tmp/review.md

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            const header = `## 🤖 AI Code Review\n\n` +
              `> Generated automatically by [review_pr.py](../blob/${{ github.sha }}/scripts/review_pr.py)\n\n`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: header + review,
            });
